<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>여름방학 특강 수업 추천 테스트 🌊</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+KR:wght@400;700&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:#87CEEB;}

.wrap{
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:160px;
  position:relative;overflow-x:hidden;
  background:#87CEEB;
}
.sky{position:absolute;top:0;left:0;width:100%;height:60%;background:#87CEEB;z-index:0;}
.water{position:absolute;top:58%;left:0;width:100%;height:22%;background:#1a7fa8;z-index:0;}
.sand{position:absolute;top:78%;left:0;width:100%;height:12%;background:#f5dfa0;z-index:0;}
.sand2{position:absolute;top:86%;left:0;width:100%;height:20%;background:#e8c96e;z-index:0;}

.sun{position:absolute;top:18px;right:52px;z-index:2;width:36px;height:36px;background:#FFD700;
  box-shadow:0 -8px 0 #FFD700,0 8px 0 #FFD700,-8px 0 0 #FFD700,8px 0 0 #FFD700,
  -6px -6px 0 #FFE44D,6px -6px 0 #FFE44D,-6px 6px 0 #FFE44D,6px 6px 0 #FFE44D,
  0 -14px 0 #FFF176,0 14px 0 #FFF176,-14px 0 0 #FFF176,14px 0 0 #FFF176;}

.cloud{position:absolute;z-index:2;}
.c1{top:14px;left:30px;} .c2{top:10px;left:38%;opacity:.75;} .c3{top:20px;right:20px;opacity:.6;}

.bird{position:absolute;top:50px;font-size:18px;z-index:3;animation:flybird 13s linear infinite;}
@keyframes flybird{0%{left:-30px}100%{left:110%}}
.fish{position:absolute;font-size:22px;z-index:5;animation:swim 8s linear infinite;bottom:145px;}
.fish2{font-size:15px;animation:swim 11s 4s linear infinite;bottom:158px;}
@keyframes swim{0%{left:-40px}100%{left:110%}}
.pxwave{position:absolute;bottom:128px;left:0;width:100%;z-index:4;pointer-events:none;}
.decor{position:absolute;bottom:62px;left:28px;font-size:34px;z-index:5;}
.decor2{position:absolute;bottom:52px;right:34px;font-size:28px;z-index:5;}
.crab{position:absolute;bottom:54px;left:46%;font-size:22px;z-index:5;animation:crabwalk 5s ease-in-out infinite alternate;}
@keyframes crabwalk{0%{transform:translateX(0)}100%{transform:translateX(18px)}}

.logo-bar{z-index:10;margin-top:22px;text-align:center;}
.logo-txt{font-family:'DotGothic16',monospace;font-size:14px;color:#083d5e;
  background:rgba(255,255,255,.88);border:2.5px solid #0077aa;
  padding:6px 20px;border-radius:4px;letter-spacing:1px;}

/* 카드 — 화면 꽉 */
.card{
  z-index:10;
  background:rgba(255,255,255,.97);
  border:3px solid #0096c7;
  border-radius:20px;
  padding:30px 24px;
  width:94%;max-width:560px;
  margin-top:16px;
  box-shadow:5px 5px 0 #005f8a;
}
.hidden{display:none!important;}

/* start */
.s-title{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;color:#0077aa;text-align:center;line-height:1.35;}
.s-sub{font-size:18px;color:#005f8a;text-align:center;margin-top:14px;font-weight:700;line-height:1.7;}
.btn-start{display:block;margin:24px auto 0;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;
  background:#ff8c00;color:#fff;border:3px solid #c95f00;border-radius:40px;
  padding:18px 54px;cursor:pointer;box-shadow:4px 4px 0 #c95f00;}

/* quiz */
.prog-wrap{width:100%;height:18px;background:#ceeef7;border:2.5px solid #0096c7;border-radius:20px;margin-bottom:22px;overflow:hidden;}
.prog-fill{height:100%;background:#ff8c00;border-radius:20px;transition:width .4s;}
.qlbl{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#0096c7;margin-bottom:6px;}
.qemo{font-size:50px;display:block;margin-bottom:12px;}
.qtxt{font-size:21px;font-weight:700;color:#003a57;line-height:1.65;margin-bottom:22px;white-space:pre-line;}
.opts{display:flex;flex-direction:column;gap:14px;}
.opt{font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:700;
  text-align:left;cursor:pointer;
  background:#e8f7fd;color:#003a57;
  border:2.5px solid #48cae4;border-radius:40px;
  padding:18px 26px;
  box-shadow:3px 3px 0 #48cae4;
  line-height:1.45;width:100%;}
.opt.sel{background:#ff8c00;color:#fff;border-color:#c95f00;box-shadow:3px 3px 0 #c95f00;}

/* result */
.res-header{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#0077aa;text-align:center;margin-bottom:8px;}
.res-name{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:#ff8c00;text-align:center;margin:8px 0;}
.res-badge{display:inline-block;background:#fff3e0;border:2px solid #ff8c00;border-radius:20px;
  font-size:16px;font-weight:700;color:#c95f00;padding:6px 22px;}
.res-desc{font-size:17px;color:#003a57;line-height:1.85;margin:18px 0;text-align:left;}
.cls-box{background:#e3f4fb;border:2.5px solid #0096c7;border-radius:14px;padding:20px 22px;box-shadow:3px 3px 0 #0077aa;}
.cls-name{font-family:'Nunito',sans-serif;font-size:21px;font-weight:900;color:#0077aa;margin-bottom:6px;}
.cls-target{font-size:15px;font-weight:700;color:#005f8a;margin-bottom:12px;}
.cls-bullets{font-size:16px;color:#003a57;line-height:1.9;white-space:pre-line;}
.cls-time{font-size:15px;font-weight:700;color:#ff8c00;margin-top:12px;}
.btn-retry{display:block;margin:22px auto 0;font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;
  background:#0096c7;color:#fff;border:3px solid #005f8a;border-radius:40px;
  padding:16px 40px;cursor:pointer;box-shadow:4px 4px 0 #005f8a;}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="sky"></div><div class="water"></div><div class="sand"></div><div class="sand2"></div>
  <div class="sun"></div>

  <svg class="cloud c1" width="90" height="34" viewBox="0 0 90 34">
    <rect x="8" y="16" width="74" height="14" fill="white" opacity=".9" rx="2"/>
    <rect x="18" y="8" width="52" height="14" fill="white" opacity=".9" rx="2"/>
    <rect x="28" y="2" width="28" height="12" fill="white" opacity=".9" rx="2"/>
  </svg>
  <svg class="cloud c2" width="72" height="28" viewBox="0 0 72 28">
    <rect x="6" y="14" width="60" height="12" fill="white" opacity=".85" rx="2"/>
    <rect x="16" y="6" width="38" height="12" fill="white" opacity=".85" rx="2"/>
  </svg>
  <svg class="cloud c3" width="62" height="24" viewBox="0 0 62 24">
    <rect x="4" y="12" width="54" height="10" fill="white" opacity=".8" rx="2"/>
    <rect x="12" y="4" width="32" height="10" fill="white" opacity=".8" rx="2"/>
  </svg>

  <div class="bird">🕊️</div>
  <div class="fish">🐠</div>
  <div class="fish fish2">🐟</div>
  <svg class="pxwave" viewBox="0 0 400 14" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" id="pxwave"></svg>
  <div class="decor">⛱️</div>
  <div class="decor2">🏄</div>
  <div class="crab">🦀</div>

  <div class="logo-bar"><span class="logo-txt">🏫 POINT JUNIOR ACADEMY</span></div>

  <div class="card" id="sc-start" style="text-align:center;">
    <div class="s-title">☀️ 여름방학 특강<br>내 수업 찾기 🌊</div>
    <div class="s-sub">딱 7문제만 풀면<br>나에게 꼭 맞는 수업 하나를 알려드려요!</div>
    <button class="btn-start" onclick="startQuiz()">▶ 시작하기!</button>
  </div>

  <div class="card hidden" id="sc-quiz">
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    <div class="qlbl" id="qlbl"></div>
    <span class="qemo" id="qemo"></span>
    <div class="qtxt" id="qtxt"></div>
    <div class="opts" id="qopts"></div>
  </div>

  <div class="card hidden" id="sc-result">
    <div class="res-header">🎉 짜잔~ 결과 발표! 🎉</div>
    <div class="res-name" id="res-name"></div>
    <div style="text-align:center;margin-bottom:14px;"><span class="res-badge" id="res-target"></span></div>
    <div class="res-desc" id="res-desc"></div>
    <div class="cls-box" id="res-box"></div>
    <button class="btn-retry" onclick="resetQuiz()">↩ 다시 테스트하기</button>
  </div>
</div>

<script>
(function(){
  const pw=document.getElementById('pxwave');
  let s='';
  for(let x=0;x<400;x+=14){
    const y=x%28===0?0:5;
    s+=`<rect x="${x}" y="${y}" width="10" height="7" fill="${x%28===0?'#48cae4':'#0096c7'}" rx="1"/>`;
  }
  pw.innerHTML=s;
})();

const Qs=[
  {emoji:'📊',txt:'이번 학교 영어 시험,\n몇 점 정도 받았어요?',opts:[
    {t:'90점 이상 🌟',g:1,v:1,l:1},{t:'75~89점 👍',g:0,v:0,l:0},
    {t:'60~74점 😅',g:-1,v:-1,l:-1},{t:'59점 이하… 😶',g:-2,v:-2,l:-2}]},
  {emoji:'🤔',txt:'영어에서 어떤 게 더 힘들어요?',opts:[
    {t:'문장 구조·문법이 어려워요 📐',g:-2,v:0,l:0},{t:'단어를 너무 몰라요 📖',g:0,v:-2,l:0},
    {t:'둘 다 힘들어요 😵',g:-1,v:-1,l:0},{t:'사실 둘 다 괜찮아요 😎',g:1,v:1,l:0}]},
  {emoji:'🎯',txt:'이번 여름방학 영어 목표는?',opts:[
    {t:'내신 성적 확 올리기!',g:0,v:0,l:1},{t:'기초를 처음부터 탄탄히 다지기',g:0,v:0,l:-1},
    {t:'어렵고 복잡한 문장 마스터하기',g:0,v:0,l:2},{t:'일단 뭐라도 시작해보기 🌱',g:0,v:0,l:-1}]},
  {emoji:'😴',txt:'나는 수업 시간에 어떤 타입?\n(솔직하게!)',opts:[
    {t:'자꾸자꾸 졸리는 타입 😴',g:0,v:0,l:0},{t:'딴생각하다 퍼뜩 정신 차리는 타입 🌙',g:0,v:0,l:0},
    {t:'그래도 열심히 듣는 타입 🔥',g:0,v:0,l:1},{t:'선생님보다 먼저 이해하는 타입 🧠',g:0,v:0,l:1}]},
  {emoji:'📝',txt:'이 단어들 중 뜻을 아는 게 몇 개?\n[ analyze / contrast / evidence / circumstances ]',opts:[
    {t:'다 알아요! 쉬운데? 😏',g:0,v:3,l:1},{t:'2~3개는 알 것 같아요',g:0,v:1,l:0},
    {t:'1개 정도만 알아요',g:0,v:-1,l:0},{t:'하나도 모르겠는데요 😶',g:0,v:-2,l:-1}]},
  {emoji:'🔍',txt:'다음 문장에서 틀린 부분을 찾을 수 있어요?\n"She don\'t like the movie that she watched it yesterday."',opts:[
    {t:'두 군데 다 보여요! (don\'t→doesn\'t, it 삭제)',g:3,v:0,l:1},
    {t:'하나는 찾았어요 (don\'t→doesn\'t)',g:1,v:0,l:0},
    {t:'틀린 건지 잘 모르겠어요 🤔',g:-1,v:0,l:0},
    {t:'문장 해석도 잘 안 돼요 😅',g:-2,v:0,l:-1}]},
  {emoji:'🏖️',txt:'방학 동안 영어 공부,\n어느 정도 할 생각이에요?',opts:[
    {t:'주 3회 이상, 제대로 할 거예요! 💪',g:0,v:0,l:1},
    {t:'수업만 열심히 들을게요',g:0,v:0,l:0},
    {t:'솔직히 방학인데… 쉬고 싶긴 해요 🌴',g:0,v:0,l:0},
    {t:'수업이 재밌으면 열심히 할 것 같아요 🤩',g:0,v:0,l:0}]}
];

const CLS={
  basic_gram:{name:'📘 1. BASIC Grammar',target:'중등 예비 1~2학년 대상',
    desc:'문법이 뭔지 잘 모르겠다면 여기서부터! 핵심 문법을 차근차근 문장에 적용하며 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사\n✔ 분사 / 수동태 / 관계사 / 비교표현\n✔ 각 파트 세부 내용을 배우고 문장에 반복 적용',
    time:'월·수·금  11:30 ~ 1:00'},
  buildup_gram:{name:'📗 2. Build UP Grammar',target:'중등 예비 2~3학년 대상',
    desc:'기초 문법은 알지만 복잡한 문장이 약하다면 여기! 다양한 구조를 패턴으로 익혀요.',
    bullets:'✔ 시제 / 수동태 / 분사 / 부정사·동명사\n✔ 관계사 / that 용법 / 접속사 심화\n✔ 문장 풀이로 패턴 완성',
    time:'월·수·금  1:00 ~ 2:30'},
  levelup_gram:{name:'📙 3. Level UP Grammar',target:'중등 예비 1~2학년 대상',
    desc:'기본 문법은 되는데 실제 문장 적용이 어렵다면! 이론을 문장에 직접 적용하며 통암기로 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사\n✔ 분사 / 수동태 / 관계사 / 비교표현\n✔ 기초 이론 적용 + 관련 문장 통암기',
    time:'화·목  11:00 ~ 1:00'},
  buildup_voca:{name:'📒 4. Build UP VOCA',target:'중등 예비 2~3학년 대상',
    desc:'단어가 발목을 잡는다면 여기! 빈칸 추론과 중요 어휘를 집중적으로 파고들어요.',
    bullets:'✔ 빈칸 추론 문제 집중 훈련\n✔ 빈칸에 필요한 단어 추론\n✔ 중요 어휘 집중 학습',
    time:'화·목  1:00 ~ 3:00'}
};

let sc={g:0,v:0,l:0},cur=0;
function show(id){['sc-start','sc-quiz','sc-result'].forEach(s=>document.getElementById(s).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function startQuiz(){sc={g:0,v:0,l:0};cur=0;show('sc-quiz');renderQ();}
function renderQ(){
  const q=Qs[cur];
  document.getElementById('qlbl').textContent='Q'+(cur+1)+' / '+Qs.length;
  document.getElementById('qemo').textContent=q.emoji;
  document.getElementById('qtxt').textContent=q.txt;
  document.getElementById('prog').style.width=Math.round((cur/Qs.length)*100)+'%';
  const c=document.getElementById('qopts');c.innerHTML='';
  q.opts.forEach(function(o,i){
    const b=document.createElement('button');b.className='opt';b.textContent=o.t;
    b.onclick=function(){pick(i);};c.appendChild(b);
  });
}
function pick(i){
  const o=Qs[cur].opts[i];sc.g+=o.g;sc.v+=o.v;sc.l+=o.l;
  document.querySelectorAll('.opt')[i].classList.add('sel');
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});
  setTimeout(function(){cur++;cur<Qs.length?renderQ():showResult();},420);
}
function showResult(){
  document.getElementById('prog').style.width='100%';
  const g=sc.g,v=sc.v,l=sc.l;
  let cls;
  if(v<=-2&&g>=-1) cls='buildup_voca';
  else if(l>=2||(g>=3&&l>=0)) cls='buildup_gram';
  else if(l<=-2||g<=-3) cls='basic_gram';
  else if(g<=-1&&l>=-1&&l<=1) cls='levelup_gram';
  else if(v<=-1) cls='buildup_voca';
  else if(g>=2&&l>=1) cls='buildup_gram';
  else cls='levelup_gram';
  const C=CLS[cls];
  fanfare();
  document.getElementById('res-name').textContent=C.name;
  document.getElementById('res-target').textContent=C.target;
  document.getElementById('res-desc').textContent=C.desc;
  document.getElementById('res-box').innerHTML=
    '<div class="cls-name">'+C.name+'</div>'+
    '<div class="cls-target">'+C.target+'</div>'+
    '<div class="cls-bullets">'+C.bullets+'</div>'+
    '<div class="cls-time">🕐 '+C.time+'</div>';
  show('sc-result');
}
function fanfare(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.13],[784,.26],[1047,.39],[784,.52],[1047,.65],[1319,.78]].forEach(function(n){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.value=n[0];
      g.gain.setValueAtTime(.15,ctx.currentTime+n[1]);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+n[1]+.19);
      o.start(ctx.currentTime+n[1]);o.stop(ctx.currentTime+n[1]+.2);
    });
  }catch(e){}
}
function resetQuiz(){show('sc-start');}
</script>
</body>
</html>
