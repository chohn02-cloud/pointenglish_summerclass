
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+KR:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(180deg,#87ceeb 0%,#b0e0ff 40%,#7ecfdf 65%,#5bb8cc 70%,#88c988 70%,#6aaa6a 80%,#4e8a4e 100%);
  border-radius:16px;overflow:hidden;position:relative;
  min-height:620px;display:flex;flex-direction:column;align-items:center;
  padding:0 0 80px;
}
.sun{position:absolute;top:16px;right:52px;width:32px;height:32px;background:#ffe44d;
  box-shadow:4px 0 0 #ffe44d,-4px 0 0 #ffe44d,0 4px 0 #ffe44d,0 -4px 0 #ffe44d,
  8px 0 0 #ffd700,-8px 0 0 #ffd700,0 8px 0 #ffd700,0 -8px 0 #ffd700,
  6px 6px 0 #ffd700,-6px 6px 0 #ffd700,6px -6px 0 #ffd700,-6px -6px 0 #ffd700;
  z-index:1;}
.clouds{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:0;}
.fish1{position:absolute;bottom:68px;font-size:18px;z-index:3;animation:swim1 9s linear infinite;}
.fish2{position:absolute;bottom:76px;font-size:13px;z-index:3;animation:swim1 6s 3s linear infinite;}
@keyframes swim1{0%{left:-40px}100%{left:110%}}
.wave-abs{position:absolute;bottom:50px;left:0;width:100%;z-index:2;pointer-events:none;}

.logo-bar{z-index:10;margin-top:16px;text-align:center;}
.logo-txt{font-family:'DotGothic16',monospace;font-size:12px;color:#0b3d6e;
  background:rgba(255,255,255,.78);border:2px solid #0b3d6e;padding:3px 12px;
  border-radius:4px;letter-spacing:1px;}

/* cards */
.card{z-index:10;background:rgba(255,255,255,.95);border:3px solid #0b3d6e;
  border-radius:10px;padding:20px 24px;max-width:510px;width:92%;
  margin-top:14px;box-shadow:5px 5px 0 #0b3d6e;}
.hidden{display:none!important;}

/* start */
.t-pixel{font-family:'DotGothic16',monospace;font-size:20px;color:#0b3d6e;line-height:1.45;}
.t-sub{font-size:13px;color:#555;margin-top:6px;}
.btn-go{margin-top:16px;font-family:'DotGothic16',monospace;font-size:15px;
  background:#ffe44d;color:#0b3d6e;border:3px solid #0b3d6e;border-radius:6px;
  padding:10px 34px;cursor:pointer;box-shadow:4px 4px 0 #0b3d6e;
  transition:transform .1s;z-index:10;display:block;}
.btn-go:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #0b3d6e;}

/* quiz */
.prog-wrap{width:100%;height:10px;background:#dceeff;border:2px solid #0b3d6e;
  border-radius:3px;margin-bottom:14px;overflow:hidden;}
.prog-fill{height:100%;background:repeating-linear-gradient(90deg,#4fc3f7 0 8px,#29b6f6 8px 16px);transition:width .4s;}
.q-lbl{font-family:'DotGothic16',monospace;font-size:11px;color:#29b6f6;margin-bottom:3px;}
.q-emo{font-size:26px;margin-bottom:6px;display:block;}
.q-txt{font-size:15px;font-weight:700;color:#0b3d6e;line-height:1.55;margin-bottom:14px;white-space:pre-line;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{font-family:'Noto Sans KR',sans-serif;font-size:13px;background:#f0faff;color:#0b3d6e;
  border:2px solid #4fc3f7;border-radius:6px;padding:10px 14px;cursor:pointer;
  text-align:left;box-shadow:3px 3px 0 #4fc3f7;transition:background .15s,transform .1s,box-shadow .1s;}
.opt:hover{background:#d0f0ff;transform:translate(-1px,-1px);box-shadow:4px 4px 0 #29b6f6;}
.opt:active{transform:translate(2px,2px);}
.opt.sel{background:#ffe44d;border-color:#0b3d6e;box-shadow:3px 3px 0 #0b3d6e;}
.opt:disabled{cursor:default;}

/* result */
.res-title{font-family:'DotGothic16',monospace;font-size:16px;color:#0b3d6e;margin-bottom:4px;text-align:center;}
.res-class{font-size:22px;font-weight:700;color:#e65100;margin:4px 0 6px;text-align:center;}
.res-badge{display:inline-block;background:#fff9c4;border:2px solid #ffc107;border-radius:20px;
  font-size:12px;color:#6d4c00;padding:3px 14px;margin-bottom:10px;}
.res-desc{font-size:13px;color:#333;line-height:1.65;margin-bottom:14px;text-align:left;}
.class-box{background:#e3f2fd;border:2px solid #1565c0;border-radius:8px;padding:12px 14px;
  margin-bottom:10px;box-shadow:3px 3px 0 #1565c0;}
.cb-name{font-size:15px;font-weight:700;color:#0d47a1;margin-bottom:2px;}
.cb-target{font-size:12px;color:#1565c0;margin-bottom:4px;}
.cb-bullets{font-size:12px;color:#333;line-height:1.6;padding-left:1px;}
.cb-time{font-size:11px;color:#555;margin-top:4px;}
.btn-retry{font-family:'DotGothic16',monospace;font-size:13px;background:#4fc3f7;color:#fff;
  border:3px solid #0b3d6e;border-radius:6px;padding:8px 24px;cursor:pointer;
  box-shadow:4px 4px 0 #0b3d6e;margin-top:14px;display:block;margin-left:auto;margin-right:auto;}
</style>

<script>
const Qs = [
  {
    id:'q1', emoji:'📊',
    txt:'이번 학교 영어 시험,\n몇 점 정도 받았어요?',
    opts:[
      {t:'90점 이상 🌟', gram:1, voc:1, lv:1},
      {t:'75~89점 👍', gram:0, voc:0, lv:0},
      {t:'60~74점 😅', gram:-1, voc:-1, lv:-1},
      {t:'59점 이하… 😶', gram:-2, voc:-2, lv:-2}
    ]
  },
  {
    id:'q2', emoji:'🤔',
    txt:'영어에서 어떤 게 더 힘들어요?',
    opts:[
      {t:'문장 구조·문법이 어려워요 📐', gram:-2, voc:0, lv:0},
      {t:'단어를 너무 몰라요 📖', gram:0, voc:-2, lv:0},
      {t:'둘 다 힘들어요 😵', gram:-1, voc:-1, lv:0},
      {t:'사실 둘 다 괜찮아요 😎', gram:1, voc:1, lv:0}
    ]
  },
  {
    id:'q3', emoji:'🎯',
    txt:'이번 여름방학 영어 목표는?',
    opts:[
      {t:'내신 성적 확 올리기!', gram:0, voc:0, lv:1},
      {t:'기초를 처음부터 탄탄히 다지기', gram:0, voc:0, lv:-1},
      {t:'어렵고 복잡한 문장 마스터하기', gram:0, voc:0, lv:2},
      {t:'일단 뭐라도 시작해보기 🌱', gram:0, voc:0, lv:-1}
    ]
  },
  {
    id:'q4', emoji:'🐠',
    txt:'나는 수업 시간에 어떤 타입?\n(솔직하게!)',
    opts:[
      {t:'자꾸자꾸 졸리는 타입 😴', gram:0, voc:0, lv:0},
      {t:'딴생각하다 정신 차리는 타입 🌙', gram:0, voc:0, lv:0},
      {t:'그래도 열심히 듣는 타입 🔥', gram:0, voc:0, lv:1},
      {t:'선생님보다 먼저 이해하는 타입 🧠', gram:0, voc:0, lv:1}
    ]
  },
  {
    id:'q5', emoji:'📝',
    txt:'이 단어들 중 뜻을 아는 게 몇 개?\n[analyze / contrast / evidence / circumstances]',
    opts:[
      {t:'다 알아요! 쉬운데? 😏', gram:0, voc:3, lv:1},
      {t:'2~3개는 알 것 같아요', gram:0, voc:1, lv:0},
      {t:'1개 정도만 알아요', gram:0, voc:-1, lv:0},
      {t:'하나도 모르겠는데요 😶', gram:0, voc:-2, lv:-1}
    ]
  },
  {
    id:'q6', emoji:'🔍',
    txt:'다음 문장에서 틀린 부분을 찾을 수 있어요?\n"She don\'t like the movie that she watched it yesterday."',
    opts:[
      {t:'두 군데 다 보여요! (don\'t→doesn\'t, it 삭제)', gram:3, voc:0, lv:1},
      {t:'하나는 찾았어요 (don\'t→doesn\'t)', gram:1, voc:0, lv:0},
      {t:'틀린 거 맞아요? 잘 모르겠어요 🤔', gram:-1, voc:0, lv:0},
      {t:'문장 해석도 잘 안 돼요 😅', gram:-2, voc:0, lv:-1}
    ]
  },
  {
    id:'q7', emoji:'🏖️',
    txt:'방학 동안 영어 공부,\n어느 정도 할 생각이에요?',
    opts:[
      {t:'주 3회 이상, 제대로 할 거예요! 💪', gram:0, voc:0, lv:1},
      {t:'수업만 열심히 들을게요', gram:0, voc:0, lv:0},
      {t:'솔직히 방학인데… 쉬고 싶긴 해요 🌴', gram:0, voc:0, lv:0},
      {t:'수업이 재밌으면 열심히 할 것 같아요 🤩', gram:0, voc:0, lv:0}
    ]
  }
];

// 4 classes
const CLASSES = {
  basic_gram: {
    name:'📘 1. BASIC Grammar',
    target:'중등 예비 1~2학년 대상',
    desc:'문법이 뭔지 잘 모르겠다면 여기서부터 시작해요! 형식, 시제, 부정사 등 핵심 문법을 차근차근 문장에 적용하며 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사 / 분사 / 수동태 / 관계사 / 비교표현\n✔ 각 파트 세부 내용을 배우고 문장에 반복 적용',
    time:'수업 시간: 월·수·금 11:30~1:00'
  },
  buildup_gram: {
    name:'📗 2. Build UP Grammar',
    target:'중등 예비 2~3학년 대상',
    desc:'기초 문법은 알지만 복잡한 문장이 약하다면 여기! 문장 풀이와 다양한 구조를 패턴으로 익혀요.',
    bullets:'✔ 시제 / 수동태 / 분사 / 부정사·동명사 / 관계사 / 접속사\n✔ that 용법 / 전치사·접속사 심화\n✔ 문장 풀이로 패턴 완성',
    time:'수업 시간: 월·수·금 1:00~2:30'
  },
  levelup_gram: {
    name:'📙 3. Level UP Grammar',
    target:'중등 예비 1~2학년 대상',
    desc:'기본 문법은 되는데 실제 문장 적용이 어렵다면! 이론을 문장에 직접 적용하며 관련 문장을 통째로 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사 / 분사 / 수동태 / 관계사 / 비교표현\n✔ 기초적 이론을 문장에 적용, 관련 문장 통암기',
    time:'수업 시간: 화·목 11:00~1:00'
  },
  buildup_voca: {
    name:'📒 4. Build UP VOCA',
    target:'중등 예비 2~3학년 대상',
    desc:'단어가 발목을 잡는다면 여기! 빈칸 추론 문제와 중요 어휘를 집중적으로 파고들어요.',
    bullets:'✔ 빈칸 추론 문제 집중 훈련\n✔ 빈칸에 필요한 단어 추론 및 중요 어휘 학습',
    time:'수업 시간: 화·목 1:00~3:00'
  }
};

let scores={gram:0,voc:0,lv:0}, cur=0;

function show(id){
  ['sc-start','sc-quiz','sc-result'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz(){scores={gram:0,voc:0,lv:0};cur=0;show('sc-quiz');renderQ();}

function renderQ(){
  const q=Qs[cur];
  document.getElementById('qlbl').textContent=`Q${cur+1} / ${Qs.length}`;
  document.getElementById('qemo').textContent=q.emoji;
  document.getElementById('qtxt').textContent=q.txt;
  document.getElementById('prog').style.width=Math.round((cur/Qs.length)*100)+'%';
  const c=document.getElementById('qopts');
  c.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o.t;
    b.onclick=()=>pick(i);
    c.appendChild(b);
  });
}

function pick(i){
  const o=Qs[cur].opts[i];
  scores.gram+=o.gram; scores.voc+=o.voc; scores.lv+=o.lv;
  const bs=document.querySelectorAll('.opt');
  bs[i].classList.add('sel');
  bs.forEach(b=>b.disabled=true);
  setTimeout(()=>{cur++;cur<Qs.length?renderQ():showResult();},400);
}

function showResult(){
  document.getElementById('prog').style.width='100%';

  // decide class
  let cls;
  const g=scores.gram, v=scores.voc, l=scores.lv;

  // voca priority
  if(v<=-2 && g>=-1){ cls='buildup_voca'; }
  // high level → buildup grammar
  else if(l>=2 || (g>=3 && l>=0)){ cls='buildup_gram'; }
  // low level basic → basic grammar
  else if(l<=-2 || (g<=-3)){ cls='basic_gram'; }
  // mid level, gram weak → level up
  else if(g<=-1 && l>=-1 && l<=1){ cls='levelup_gram'; }
  // mid level, voca weak
  else if(v<=-1){ cls='buildup_voca'; }
  // mid level good gram
  else if(g>=2 && l>=1){ cls='buildup_gram'; }
  // default
  else{ cls='levelup_gram'; }

  const C=CLASSES[cls];
  playFanfare();

  document.getElementById('res-cname').textContent=C.name;
  document.getElementById('res-target').textContent=C.target;
  document.getElementById('res-desc').textContent=C.desc;
  document.getElementById('res-box').innerHTML=
    `<div class="cb-name">${C.name}</div>`+
    `<div class="cb-target">${C.target}</div>`+
    `<div class="cb-bullets" style="white-space:pre-line">${C.bullets}</div>`+
    `<div class="cb-time">🕐 ${C.time}</div>`;

  show('sc-result');
}

function playFanfare(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784,1047,784,1047];
    const times=[0,.12,.24,.36,.5,.62];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='square';
      o.frequency.value=f;
      g.gain.setValueAtTime(0.18,ctx.currentTime+times[i]);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+times[i]+0.18);
      o.start(ctx.currentTime+times[i]);
      o.stop(ctx.currentTime+times[i]+0.2);
    });
  }catch(e){}
}

function resetQuiz(){show('sc-start');}
</script>
