<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Point Junior 여름방학 특강 테스트 🌊</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+KR:wght@400;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow-x:hidden;}

/* ── BASE ── */
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#5ac8fa;
  min-height:100vh;
}

/* ── SCENE (fixed bg layers) ── */
.scene{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;overflow:hidden;
}
.sky-bg{position:absolute;inset:0;background:linear-gradient(180deg,#48b6e8 0%,#7dd6f5 55%,#5bb8cc 65%,#1a7fa8 72%,#1a7fa8 80%,#f5dfa0 80%,#e8c96e 90%,#c9a84c 100%);}

/* pixel sun */
.sun{position:absolute;top:22px;right:58px;width:0;height:0;
  box-shadow:
    8px 0 0 6px #FFD700,-8px 0 0 6px #FFD700,
    0 8px 0 6px #FFD700,0 -8px 0 6px #FFD700,
    0 0 0 6px #FFE44D,
    16px 0 0 4px #FFF176,-16px 0 0 4px #FFF176,
    0 16px 0 4px #FFF176,0 -16px 0 4px #FFF176,
    12px 12px 0 4px #FFF176,-12px 12px 0 4px #FFF176,
    12px -12px 0 4px #FFF176,-12px -12px 0 4px #FFF176;}

/* clouds */
.cloud{position:absolute;}
.cl1{top:18px;left:24px;animation:drift 20s linear infinite;}
.cl2{top:10px;left:42%;opacity:.8;animation:drift 28s 6s linear infinite;}
.cl3{top:26px;right:16px;opacity:.65;animation:drift 24s 12s linear infinite;}
@keyframes drift{0%{transform:translateX(0)}50%{transform:translateX(12px)}100%{transform:translateX(0)}}

/* fish */
.fish-a{position:absolute;font-size:22px;bottom:155px;animation:swim 9s linear infinite;}
.fish-b{position:absolute;font-size:15px;bottom:168px;animation:swim 12s 5s linear infinite;}
@keyframes swim{from{left:-50px}to{left:110%}}

/* pixel wave */
.wave-row{position:absolute;bottom:143px;left:0;width:100%;}

/* beach decor */
.umbrella{position:absolute;bottom:72px;left:22px;font-size:36px;z-index:1;}
.surfer{position:absolute;bottom:66px;right:28px;font-size:30px;z-index:1;}
.crab-el{position:absolute;bottom:68px;left:48%;font-size:22px;z-index:1;animation:crabwalk 4s ease-in-out infinite alternate;}
@keyframes crabwalk{from{transform:translateX(0)}to{transform:translateX(22px)}}

/* ── SCROLL CONTAINER ── */
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 0 200px;
}

/* ── LOGO ── */
.logo-bar{
  margin-top:24px;text-align:center;
}
.logo-pill{
  display:inline-block;
  font-family:'DotGothic16',monospace;
  font-size:13px;color:#083d5e;
  background:rgba(255,255,255,.9);
  border:2.5px solid #0077aa;
  padding:5px 18px;border-radius:6px;
  letter-spacing:.8px;
}

/* ── SCREENS ── */
.screen{width:94%;max-width:480px;margin-top:18px;}
.hidden{display:none!important;}

/* ══ START SCREEN ══ */
#sc-start{display:flex;flex-direction:column;align-items:center;gap:0;}

.game-title-box{
  background:rgba(255,255,255,.97);
  border:4px solid #0077aa;
  border-radius:24px;
  padding:28px 24px 22px;
  width:100%;
  box-shadow:0 6px 0 #005580, 6px 6px 0 #003a57;
  text-align:center;
}
.game-eyebrow{
  font-family:'DotGothic16',monospace;
  font-size:13px;color:#0096c7;
  letter-spacing:1px;margin-bottom:10px;
}
.game-logo-text{
  font-family:'Nunito',sans-serif;
  font-size:38px;font-weight:900;
  color:#0077aa;
  line-height:1.1;
  text-shadow:3px 3px 0 #b3dff0;
  margin-bottom:6px;
}
.game-sub{
  font-size:16px;font-weight:700;color:#005f8a;line-height:1.65;margin-top:6px;
}

/* pixel-art START button */
.btn-start-wrap{margin-top:22px;width:100%;display:flex;justify-content:center;}
.btn-start{
  font-family:'Nunito',sans-serif;
  font-size:28px;font-weight:900;
  background:#ff8c00;color:#fff;
  border:none;border-radius:14px;
  padding:20px 0;width:88%;
  cursor:pointer;
  box-shadow:0 7px 0 #a85400, 4px 7px 0 #6b3500;
  letter-spacing:1px;
  transition:transform .08s,box-shadow .08s;
  position:relative;
}
.btn-start:active{transform:translateY(5px);box-shadow:0 2px 0 #a85400;}
.btn-start::before{content:'▶  ';font-size:24px;}

/* character sprite area */
.sprites{
  display:flex;justify-content:center;gap:18px;
  margin-top:18px;font-size:40px;
}
.sprite{animation:bounce 1.8s ease-in-out infinite;}
.sprite:nth-child(2){animation-delay:.3s;}
.sprite:nth-child(3){animation-delay:.6s;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ══ QUIZ SCREEN ══ */
#sc-quiz{
  background:rgba(255,255,255,.97);
  border:4px solid #0096c7;
  border-radius:22px;
  padding:26px 22px 28px;
  box-shadow:0 6px 0 #005580,6px 6px 0 #003a57;
}

/* HP / progress bar */
.hud{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.hud-label{font-family:'DotGothic16',monospace;font-size:12px;color:#0096c7;white-space:nowrap;}
.prog-track{flex:1;height:20px;background:#ddf0f9;border:2.5px solid #0096c7;border-radius:20px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#00c6ff,#0096c7);border-radius:20px;transition:width .45s cubic-bezier(.4,0,.2,1);}
.q-counter{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:#0096c7;white-space:nowrap;}

/* question */
.q-emoji{font-size:52px;display:block;text-align:center;margin-bottom:10px;animation:popIn .3s cubic-bezier(.17,.67,.37,1.3);}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.q-text{font-size:20px;font-weight:700;color:#003a57;line-height:1.65;margin-bottom:20px;white-space:pre-line;text-align:center;}

/* options */
.opts{display:flex;flex-direction:column;gap:12px;}
.opt{
  font-family:'Noto Sans KR',sans-serif;
  font-size:17px;font-weight:700;
  text-align:left;
  background:#e8f7fd;color:#003a57;
  border:3px solid #48cae4;
  border-radius:14px;
  padding:17px 22px;
  width:100%;cursor:pointer;
  box-shadow:0 5px 0 #2aa8c8;
  transition:transform .08s,box-shadow .08s;
  line-height:1.4;
}
.opt:active,.opt:hover{transform:translateY(3px);box-shadow:0 2px 0 #2aa8c8;}
.opt.sel{background:#ff8c00;color:#fff;border-color:#c95f00;box-shadow:0 2px 0 #7a3800;}
.opt:disabled{cursor:default;opacity:.85;}

/* ══ RESULT SCREEN ══ */
#sc-result{
  background:rgba(255,255,255,.97);
  border:4px solid #0096c7;
  border-radius:22px;
  padding:28px 22px 30px;
  box-shadow:0 6px 0 #005580,6px 6px 0 #003a57;
  text-align:center;
}
.result-tada{font-size:48px;display:block;margin-bottom:6px;animation:spin .6s ease-out;}
@keyframes spin{from{transform:rotate(-20deg) scale(.5)}to{transform:rotate(0deg) scale(1)}}
.result-header{font-family:'DotGothic16',monospace;font-size:15px;color:#0096c7;letter-spacing:.5px;margin-bottom:8px;}
.result-class-name{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:#ff8c00;margin:6px 0 10px;line-height:1.2;}
.result-badge{
  display:inline-block;
  background:#fff3e0;border:2.5px solid #ff8c00;
  border-radius:30px;font-size:15px;font-weight:700;
  color:#c95f00;padding:6px 22px;margin-bottom:14px;
}
.result-desc{font-size:16px;color:#003a57;line-height:1.8;text-align:left;margin-bottom:18px;}

.cls-card{
  background:#e3f4fb;
  border:3px solid #0096c7;
  border-radius:16px;
  padding:20px 20px 18px;
  box-shadow:0 4px 0 #0077aa;
  text-align:left;
}
.cls-name{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:#0077aa;margin-bottom:4px;}
.cls-target{font-size:13px;font-weight:700;color:#0096c7;margin-bottom:12px;}
.cls-bullets{font-size:15px;color:#003a57;line-height:1.9;white-space:pre-line;}
.cls-time{font-size:14px;font-weight:700;color:#ff8c00;margin-top:12px;}

.btn-retry{
  display:block;margin:22px auto 0;
  font-family:'Nunito',sans-serif;
  font-size:19px;font-weight:900;
  background:#0096c7;color:#fff;
  border:none;border-radius:12px;
  padding:16px 42px;
  cursor:pointer;
  box-shadow:0 5px 0 #005580;
  transition:transform .08s,box-shadow .08s;
}
.btn-retry:active{transform:translateY(3px);box-shadow:0 2px 0 #005580;}
</style>
</head>
<body>

<!-- FIXED SCENE -->
<div class="scene">
  <div class="sky-bg"></div>
  <div class="sun"></div>

  <svg class="cloud cl1" width="96" height="38" viewBox="0 0 96 38">
    <rect x="10" y="20" width="76" height="16" fill="white" opacity=".92" rx="3"/>
    <rect x="22" y="10" width="52" height="16" fill="white" opacity=".92" rx="3"/>
    <rect x="32" y="2"  width="30" height="14" fill="white" opacity=".92" rx="3"/>
  </svg>
  <svg class="cloud cl2" width="78" height="30" viewBox="0 0 78 30">
    <rect x="6"  y="16" width="66" height="14" fill="white" opacity=".88" rx="3"/>
    <rect x="18" y="6"  width="44" height="14" fill="white" opacity=".88" rx="3"/>
  </svg>
  <svg class="cloud cl3" width="64" height="26" viewBox="0 0 64 26">
    <rect x="4"  y="14" width="56" height="12" fill="white" opacity=".8" rx="3"/>
    <rect x="14" y="4"  width="34" height="12" fill="white" opacity=".8" rx="3"/>
  </svg>

  <div class="fish-a">🐠</div>
  <div class="fish-b">🐟</div>

  <svg class="wave-row" viewBox="0 0 400 14" preserveAspectRatio="none" id="wave-svg"></svg>

  <div class="umbrella">⛱️</div>
  <div class="surfer">🏄</div>
  <div class="crab-el">🦀</div>
</div>

<!-- SCROLLABLE PAGE -->
<div class="page">
  <div class="logo-bar">
    <span class="logo-pill">🏫 POINT JUNIOR ACADEMY</span>
  </div>

  <!-- ── START ── -->
  <div class="screen" id="sc-start">
    <div class="game-title-box">
      <div class="game-eyebrow">✦ 2025 여름방학 특강 ✦</div>
      <div class="game-logo-text">내 수업<br>찾기 🌊</div>
      <div class="game-sub">7문제를 풀고<br>딱 맞는 수업을 알아봐요!</div>
    </div>

    <div class="sprites">
      <span class="sprite">🐡</span>
      <span class="sprite">⭐</span>
      <span class="sprite">🐚</span>
    </div>

    <div class="btn-start-wrap">
      <button class="btn-start" onclick="startQuiz()">START!</button>
    </div>
  </div>

  <!-- ── QUIZ ── -->
  <div class="screen hidden" id="sc-quiz">
    <div class="hud">
      <span class="hud-label">진행</span>
      <div class="prog-track"><div class="prog-bar" id="prog" style="width:0%"></div></div>
      <span class="q-counter" id="qctr">1 / 7</span>
    </div>
    <span class="q-emoji" id="qemo"></span>
    <div class="q-text" id="qtxt"></div>
    <div class="opts" id="qopts"></div>
  </div>

  <!-- ── RESULT ── -->
  <div class="screen hidden" id="sc-result">
    <span class="result-tada">🎉</span>
    <div class="result-header">✦ 추천 수업 발표! ✦</div>
    <div class="result-class-name" id="res-name"></div>
    <div><span class="result-badge" id="res-target"></span></div>
    <div class="result-desc" id="res-desc"></div>
    <div class="cls-card" id="res-box"></div>
    <button class="btn-retry" onclick="resetQuiz()">↩ 다시하기</button>
  </div>
</div>

<script>
/* pixel wave */
(function(){
  var s='',pw=document.getElementById('wave-svg');
  for(var x=0;x<400;x+=14){
    var y=x%28===0?0:5,c=x%28===0?'#48cae4':'#0096c7';
    s+='<rect x="'+x+'" y="'+y+'" width="10" height="7" fill="'+c+'" rx="1"/>';
  }
  pw.innerHTML=s;
})();

var Qs=[
  {emoji:'📊',txt:'이번 학교 영어 시험,\n몇 점 정도 받았어요?',opts:[
    {t:'90점 이상 🌟',g:1,v:1,l:1},
    {t:'75~89점 👍',g:0,v:0,l:0},
    {t:'60~74점 😅',g:-1,v:-1,l:-1},
    {t:'59점 이하… 😶',g:-2,v:-2,l:-2}]},
  {emoji:'🤔',txt:'영어에서 어떤 게 더 힘들어요?',opts:[
    {t:'문장 구조·문법이 어려워요 📐',g:-2,v:0,l:0},
    {t:'단어를 너무 몰라요 📖',g:0,v:-2,l:0},
    {t:'둘 다 힘들어요 😵',g:-1,v:-1,l:0},
    {t:'사실 둘 다 괜찮아요 😎',g:1,v:1,l:0}]},
  {emoji:'🎯',txt:'이번 여름방학 영어 목표는?',opts:[
    {t:'내신 성적 확 올리기!',g:0,v:0,l:1},
    {t:'기초를 처음부터 탄탄히 다지기',g:0,v:0,l:-1},
    {t:'어렵고 복잡한 문장 마스터하기',g:0,v:0,l:2},
    {t:'일단 뭐라도 시작해보기 🌱',g:0,v:0,l:-1}]},
  {emoji:'😴',txt:'나는 수업 시간에\n어떤 타입? (솔직하게!)',opts:[
    {t:'자꾸자꾸 졸리는 타입 😴',g:0,v:0,l:0},
    {t:'딴생각하다 퍼뜩 정신 차리는 타입 🌙',g:0,v:0,l:0},
    {t:'그래도 열심히 듣는 타입 🔥',g:0,v:0,l:1},
    {t:'선생님보다 먼저 이해하는 타입 🧠',g:0,v:0,l:1}]},
  {emoji:'📝',txt:'이 단어들 중 뜻을 아는 게 몇 개?\n[ analyze / contrast / evidence / circumstances ]',opts:[
    {t:'다 알아요! 쉬운데? 😏',g:0,v:3,l:1},
    {t:'2~3개는 알 것 같아요',g:0,v:1,l:0},
    {t:'1개 정도만 알아요',g:0,v:-1,l:0},
    {t:'하나도 모르겠는데요 😶',g:0,v:-2,l:-1}]},
  {emoji:'🔍',txt:'다음 문장에서 틀린 부분을 찾을 수 있어요?\n"She don\'t like the movie that she watched it yesterday."',opts:[
    {t:'두 군데 다 보여요! (don\'t→doesn\'t, it 삭제)',g:3,v:0,l:1},
    {t:'하나는 찾았어요 (don\'t→doesn\'t)',g:1,v:0,l:0},
    {t:'틀린 건지 잘 모르겠어요 🤔',g:-1,v:0,l:0},
    {t:'문장 해석도 잘 안 돼요 😅',g:-2,v:0,l:-1}]},
  {emoji:'🏖️',txt:'방학 동안 영어 공부,\n어느 정도 할 생각이에요?',opts:[
    {t:'주 3회 이상, 제대로 할 거예요! 💪',g:0,v:0,l:1},
    {t:'수업만 열심히 들을게요',g:0,v:0,l:0},
    {t:'솔직히 방학인데… 쉬고 싶긴 해요 🌴',g:0,v:0,l:0},
    {t:'수업이 재밌으면 열심히 할 것 같아요 🤩',g:0,v:0,l:0}]}
];

var CLS={
  basic_gram:{
    name:'📘 1. BASIC Grammar',target:'중등 예비 1~2학년 대상',
    desc:'문법이 뭔지 잘 모르겠다면 여기서부터! 핵심 문법을 차근차근 문장에 적용하며 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사\n✔ 분사 / 수동태 / 관계사 / 비교표현\n✔ 각 파트 배우고 문장에 반복 적용',
    time:'월·수·금  11:30 ~ 1:00'},
  buildup_gram:{
    name:'📗 2. Build UP Grammar',target:'중등 예비 2~3학년 대상',
    desc:'기초 문법은 알지만 복잡한 문장이 약하다면 여기! 다양한 구조를 패턴으로 익혀요.',
    bullets:'✔ 시제 / 수동태 / 분사 / 부정사·동명사\n✔ 관계사 / that 용법 / 접속사 심화\n✔ 문장 풀이로 패턴 완성',
    time:'월·수·금  1:00 ~ 2:30'},
  levelup_gram:{
    name:'📙 3. Level UP Grammar',target:'중등 예비 1~2학년 대상',
    desc:'기본 문법은 되는데 실제 문장 적용이 어렵다면! 이론을 문장에 직접 적용하며 통암기로 익혀요.',
    bullets:'✔ 형식 / 시제 / 부정사 / 동명사\n✔ 분사 / 수동태 / 관계사 / 비교표현\n✔ 기초 이론 적용 + 관련 문장 통암기',
    time:'화·목  11:00 ~ 1:00'},
  buildup_voca:{
    name:'📒 4. Build UP VOCA',target:'중등 예비 2~3학년 대상',
    desc:'단어가 발목을 잡는다면 여기! 빈칸 추론과 중요 어휘를 집중적으로 파고들어요.',
    bullets:'✔ 빈칸 추론 문제 집중 훈련\n✔ 빈칸에 필요한 단어 추론\n✔ 중요 어휘 집중 학습',
    time:'화·목  1:00 ~ 3:00'}
};

var sc={g:0,v:0,l:0},cur=0;

function show(id){
  ['sc-start','sc-quiz','sc-result'].forEach(function(s){
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(){
  sc={g:0,v:0,l:0};cur=0;
  show('sc-quiz');renderQ();
}

function renderQ(){
  var q=Qs[cur];
  document.getElementById('qctr').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('prog').style.width=Math.round((cur/Qs.length)*100)+'%';
  /* re-trigger animation */
  var emo=document.getElementById('qemo');
  emo.textContent=''; 
  setTimeout(function(){emo.textContent=q.emoji;},10);
  document.getElementById('qtxt').textContent=q.txt;
  var c=document.getElementById('qopts');c.innerHTML='';
  q.opts.forEach(function(o,i){
    var b=document.createElement('button');
    b.className='opt';b.textContent=o.t;
    b.onclick=function(){pick(i);};
    c.appendChild(b);
  });
}

function pick(i){
  var o=Qs[cur].opts[i];
  sc.g+=o.g;sc.v+=o.v;sc.l+=o.l;
  var bs=document.querySelectorAll('.opt');
  bs[i].classList.add('sel');
  bs.forEach(function(b){b.disabled=true;});
  setTimeout(function(){
    cur++;
    if(cur<Qs.length) renderQ();
    else showResult();
  },380);
}

function showResult(){
  document.getElementById('prog').style.width='100%';
  var g=sc.g,v=sc.v,l=sc.l,cls;
  if(v<=-2&&g>=-1)          cls='buildup_voca';
  else if(l>=2||(g>=3&&l>=0)) cls='buildup_gram';
  else if(l<=-2||g<=-3)     cls='basic_gram';
  else if(g<=-1&&l>=-1&&l<=1) cls='levelup_gram';
  else if(v<=-1)             cls='buildup_voca';
  else if(g>=2&&l>=1)        cls='buildup_gram';
  else                       cls='levelup_gram';

  var C=CLS[cls];
  fanfare();
  document.getElementById('res-name').textContent=C.name;
  document.getElementById('res-target').textContent=C.target;
  document.getElementById('res-desc').textContent=C.desc;
  document.getElementById('res-box').innerHTML=
    '<div class="cls-name">'+C.name+'</div>'+
    '<div class="cls-target">'+C.target+'</div>'+
    '<div class="cls-bullets">'+C.bullets+'</div>'+
    '<div class="cls-time">🕐 '+C.time+'</div>';
  show('sc-result');
}

function fanfare(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.12],[784,.24],[1047,.38],[784,.5],[1047,.62],[1319,.74]].forEach(function(n){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='square';o.frequency.value=n[0];
      g.gain.setValueAtTime(.15,ctx.currentTime+n[1]);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+n[1]+.18);
      o.start(ctx.currentTime+n[1]);
      o.stop(ctx.currentTime+n[1]+.2);
    });
  }catch(e){}
}

function resetQuiz(){show('sc-start');}
</script>
